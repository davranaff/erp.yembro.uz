services:
  api:
    image: ${BACKEND_IMAGE}
    env_file:
      - ./.env
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:30000
      - --workers
      - "3"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    init: true
    restart: unless-stopped
    networks:
      - internal
      - public
    volumes:
      - uploads_data:${APP_STORAGE_LOCAL_ROOT:-/data/uploads}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:30000/health', timeout=5).read()"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    image: ${BACKEND_IMAGE}
    env_file:
      - ./.env
    command:
      - sh
      - -c
      - "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  worker:
    image: ${BACKEND_IMAGE}
    env_file:
      - ./.env
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    init: true
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - uploads_data:${APP_STORAGE_LOCAL_ROOT:-/data/uploads}
    healthcheck:
      test:
        - CMD-SHELL
        - "celery -A config inspect ping -d celery@$$HOSTNAME >/dev/null 2>&1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  scheduler:
    image: ${BACKEND_IMAGE}
    env_file:
      - ./.env
    command:
      - celery
      - -A
      - config
      - beat
      - -l
      - info
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    init: true
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - uploads_data:${APP_STORAGE_LOCAL_ROOT:-/data/uploads}
    healthcheck:
      test:
        - CMD-SHELL
        - "tr '\\000' ' ' </proc/1/cmdline | grep -q 'celery .* beat'"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data: {}
  redis_data: {}
  uploads_data: {}

networks:
  internal: {}
  public: {}
