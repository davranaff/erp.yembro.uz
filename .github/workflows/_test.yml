name: Reusable Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: erp_test
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: django-db
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Run backend tests
        run: pytest

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint:ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend build
        env:
          NEXT_PUBLIC_API_URL: /api
          NEXT_PUBLIC_AUTH_LOGIN_ENDPOINT: /api/auth/token/
          NEXT_PUBLIC_REQUEST_TIMEOUT_MS: "15000"
          NEXT_PUBLIC_APP_NAME: Yembro
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
