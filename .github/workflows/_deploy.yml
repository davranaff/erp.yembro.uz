name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      deploy_path:
        required: true
        type: string
      image_alias:
        required: true
        type: string
      frontend_api_base_url:
        required: true
        type: string

jobs:
  deploy:
    name: Build and deploy ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    concurrency:
      group: deploy-${{ inputs.environment_name }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: meta
        env:
          REGISTRY_BACKEND_REPO: ${{ vars.REGISTRY_BACKEND_REPO }}
          REGISTRY_FRONTEND_REPO: ${{ vars.REGISTRY_FRONTEND_REPO }}
        run: |
          set -Eeuo pipefail
          sanitize_repo() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | tr -d '\r\n' \
              | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          }

          validate_repo() {
            local value="$1"
            local name="$2"

            if [[ -z "${value}" ]]; then
              echo "${name} GitHub variable must not be empty" >&2
              exit 1
            fi

            if [[ "${value}" =~ [[:space:]] ]]; then
              echo "${name} must not contain whitespace: '${value}'" >&2
              exit 1
            fi

            if [[ ! "${value}" =~ ^[a-z0-9._/-]+$ ]]; then
              echo "${name} has invalid format: '${value}'" >&2
              exit 1
            fi
          }

          backend_repo="$(sanitize_repo "${REGISTRY_BACKEND_REPO}")"
          frontend_repo="$(sanitize_repo "${REGISTRY_FRONTEND_REPO}")"
          if [[ -z "${backend_repo}" || -z "${frontend_repo}" ]]; then
            echo "REGISTRY_BACKEND_REPO and REGISTRY_FRONTEND_REPO GitHub vars must be configured" >&2
            exit 1
          fi
          validate_repo "${backend_repo}" "REGISTRY_BACKEND_REPO"
          validate_repo "${frontend_repo}" "REGISTRY_FRONTEND_REPO"
          echo "backend_image=${backend_repo}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${frontend_repo}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "alias_tag=${{ inputs.image_alias }}" >> "${GITHUB_OUTPUT}"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.alias_tag }}
          cache-from: type=gha,scope=backend-${{ inputs.environment_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ inputs.environment_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ inputs.frontend_api_base_url }}
            VITE_AUTH_LOGIN_ENDPOINT=/auth/login
            VITE_REQUEST_TIMEOUT_MS=15000
            VITE_APP_NAME=Yembro
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.alias_tag }}
          cache-from: type=gha,scope=frontend-${{ inputs.environment_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ inputs.environment_name }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure known hosts
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync deployment assets to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -Eeuo pipefail
          port="${DEPLOY_PORT:-22}"

          case "${{ inputs.environment_name }}" in
            production)
              override_file="compose.prod.yml"
              env_example=".env.prod.example"
              ;;
            staging)
              override_file="compose.staging.yml"
              env_example=".env.staging.example"
              ;;
            *)
              echo "Unsupported environment: ${{ inputs.environment_name }}" >&2
              exit 1
              ;;
          esac

          ssh -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${{ inputs.deploy_path }}/deploy' '/opt/yembro/edge/deploy/caddy'"

          rsync -az -e "ssh -p ${port}" \
            compose.base.yml \
            "${override_file}" \
            "${env_example}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${{ inputs.deploy_path }}/"

          rsync -az -e "ssh -p ${port}" \
            deploy/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${{ inputs.deploy_path }}/deploy/"

          rsync -az -e "ssh -p ${port}" \
            compose.edge.yml \
            .env.edge.example \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/yembro/edge/"

          rsync -az -e "ssh -p ${port}" \
            deploy/caddy/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/yembro/edge/deploy/caddy/"

      - name: Deploy on remote server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          BACKEND_IMAGE: ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.sha_tag }}
          FRONTEND_IMAGE: ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.sha_tag }}
        run: |
          set -Eeuo pipefail
          port="${DEPLOY_PORT:-22}"
          registry_host_quoted="$(printf '%q' "${REGISTRY_HOST}")"
          registry_user_quoted="$(printf '%q' "${REGISTRY_USERNAME}")"
          registry_password_quoted="$(printf '%q' "${REGISTRY_PASSWORD}")"
          backend_image_quoted="$(printf '%q' "${BACKEND_IMAGE}")"
          frontend_image_quoted="$(printf '%q' "${FRONTEND_IMAGE}")"

          ssh -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -Eeuo pipefail
          cd '${{ inputs.deploy_path }}'
          chmod +x deploy/scripts/*.sh
          printf '%s' ${registry_password_quoted} | docker login ${registry_host_quoted} -u ${registry_user_quoted} --password-stdin
          BACKEND_IMAGE=${backend_image_quoted} FRONTEND_IMAGE=${frontend_image_quoted} EDGE_DIR='/opt/yembro/edge' ./deploy/scripts/deploy.sh '${{ inputs.environment_name }}'
          EOF

      - name: Validate public health endpoint
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 \
            "${PUBLIC_BASE_URL%/}/health"
