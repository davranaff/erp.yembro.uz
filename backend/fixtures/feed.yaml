#              cd119e9b... (EGG-WH),       e77c27ea... (FACT-WH)
#   Poultry:   broyler b0000000-...-01, layer b0000000-...-03, parent b0000000-...-05
#   Employees: 70111111...105 (Jasur, feed head), 70111111...106 (Shahnoza, mixer op)

