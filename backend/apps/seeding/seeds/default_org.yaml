  - {code: EQUIP_MAINT,   name: "Обслуживание оборудования", kind: expense, parent: PRODUCTION, default_subaccount: "26.03"}

  - {code: FUEL,          name: "Топливо и ГСМ",             kind: expense, parent: TRANSPORT, default_subaccount: "10.04"}
  - {code: TRANSPORT_SVC, name: "Транспортные услуги",       kind: expense, parent: TRANSPORT, default_subaccount: "44.01"}

  - {code: OFFICE,        name: "Канцелярия/офис",           kind: expense, parent: ADMIN,     default_subaccount: "26.04"}
  - {code: RENT,          name: "Аренда помещений",          kind: expense, parent: ADMIN,     default_subaccount: "26.01"}
  - {code: ADVERTISING,   name: "Реклама и маркетинг",       kind: expense, parent: SALES_EXP, default_subaccount: "44.02"}

  - {code: TAX_OTHER,     name: "Прочие налоги",             kind: expense, parent: TAX,       default_subaccount: "26.05"}

  - {code: OTHER_INCOME,  name: "Прочий доход",              kind: income,  parent: INCOME_GROUP, default_subaccount: "91.01"}
  - {code: OTHER_EXPENSE, name: "Прочий расход",             kind: expense, parent: OTHER_EXP,    default_subaccount: "91.02"}

  - {code: FX_GAIN,       name: "Курсовая разница (доход)",  kind: income,  parent: FX, default_subaccount: "91.03"}
