# Core-fixture для новой организации YemBro ERP.
#
# Запуск:
#   python manage.py seed_organization <org_code>
#   python manage.py seed_organization <org_code> --config path/to/other.yaml
#   python manage.py seed_organization <org_code> --dry-run
#
# Идемпотентен: повторный прогон не создаёт дубликатов и не перезаписывает
# вручную изменённые поля. Резолверы:
#   module: feed         → Module.objects.get(code='feed')         (глобальный)
#   account: "10"        → GLAccount(organization=org, code='10')
#   subaccount: "10.05"  → GLSubaccount(account__organization=org, code='10.05')
#   unit: kg             → Unit(organization=org, code='kg')
#   category: "Корма"    → Category(organization=org, name='Корма')
#   parent (для expense_articles): код другой статьи

version: 1
description: "Стандартный набор для бройлерной/яичной фермы"

# ─────────────────────────────────────────────────────────────────────
# 1. Единицы измерения
# ─────────────────────────────────────────────────────────────────────
units:
  - {code: pcs,   name: "Штука"}
  - {code: kg,    name: "Килограмм"}
  - {code: t,     name: "Тонна"}
  - {code: g,     name: "Грамм"}
  - {code: l,     name: "Литр"}
  - {code: ml,    name: "Миллилитр"}
  - {code: head,  name: "Голова"}
  - {code: dose,  name: "Доза"}
  - {code: m2,    name: "Квадратный метр"}
  - {code: m3,    name: "Кубический метр"}

# ─────────────────────────────────────────────────────────────────────
# 2. План счетов (синтетические счета)
# ─────────────────────────────────────────────────────────────────────
accounts:
  # Активы
  - {code: "10", name: "Материалы",                     type: asset}
  - {code: "20", name: "Основное производство",         type: expense}
  - {code: "26", name: "Общехозяйственные расходы",     type: expense}
  - {code: "43", name: "Готовая продукция",             type: asset}
  - {code: "44", name: "Расходы на продажу",            type: expense}
  - {code: "50", name: "Касса",                         type: asset}
  - {code: "51", name: "Расчётный счёт",                type: asset}
  - {code: "52", name: "Валютный счёт",                 type: asset}
  - {code: "57", name: "Переводы в пути",               type: asset}
  - {code: "58", name: "Электронные кошельки / Click",  type: asset}
  - {code: "60", name: "Расчёты с поставщиками",        type: liability}
  - {code: "62", name: "Расчёты с покупателями",        type: asset}
  - {code: "70", name: "Расчёты с персоналом",          type: liability}
  - {code: "71", name: "Расчёты с подотчётными лицами", type: asset}
  - {code: "76", name: "Расчёты с разными дебиторами/кредиторами", type: liability}
  - {code: "79", name: "Внутрихозяйственные расчёты",   type: service}
  - {code: "84", name: "Нераспределённая прибыль (убыток)", type: equity}
  - {code: "90", name: "Продажи",                       type: income}
  - {code: "91", name: "Прочие доходы и расходы",       type: income}
  - {code: "99", name: "Прибыли и убытки",              type: service}

# ─────────────────────────────────────────────────────────────────────
# 3. Субсчета
#    module — опционально. Привязка к модулю помогает фильтровать в UI.
# ─────────────────────────────────────────────────────────────────────
subaccounts:
  # 10 · Материалы
  - {code: "10.01", account: "10", name: "Сырьё и материалы"}
  - {code: "10.02", account: "10", name: "Живая птица (ремонт молодняк)"}
  - {code: "10.03", account: "10", name: "Ветпрепараты",         module: vet}
  - {code: "10.04", account: "10", name: "Топливо и ГСМ"}
  - {code: "10.05", account: "10", name: "Корма",                module: feed}
  - {code: "10.06", account: "10", name: "Инвентарь и хозтовары"}
  - {code: "10.07", account: "10", name: "Тара и упаковка"}
  - {code: "10.08", account: "10", name: "Запчасти"}

  # 20 · Основное производство (НЗП)
  - {code: "20.01", account: "20", name: "НЗП · Маточник",        module: matochnik}
  - {code: "20.02", account: "20", name: "НЗП · Откорм бройлера", module: feedlot}
  - {code: "20.03", account: "20", name: "НЗП · Инкубация",       module: incubation}
  - {code: "20.04", account: "20", name: "НЗП · Убойня",          module: slaughter}
  - {code: "20.05", account: "20", name: "НЗП · Производство кормов", module: feed}

  # 26 · Общехозяйственные расходы
