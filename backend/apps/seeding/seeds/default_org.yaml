# ─────────────────────────────────────────────────────────────────────
# 4. Статьи расходов/доходов (аналитика поверх плана счетов)
#    Двухпроходный seed: parent создаётся первым.
# ─────────────────────────────────────────────────────────────────────
expense_articles:
