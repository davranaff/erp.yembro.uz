  - {code: COMMS,         name: "Связь и интернет",    kind: expense}
  - {code: SALARY_GROUP,  name: "Зарплата и налоги",   kind: expense}
  - {code: PRODUCTION,    name: "Производственные расходы", kind: expense}
  - {code: TRANSPORT,     name: "Транспорт и ГСМ",     kind: expense}
  - {code: ADMIN,         name: "Административные",    kind: expense}
