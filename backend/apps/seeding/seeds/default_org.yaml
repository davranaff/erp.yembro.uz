  - {code: WASTE,         name: "Вывоз ТБО",                 kind: expense, parent: UTILS, default_subaccount: "26.01"}

  - {code: INTERNET,      name: "Интернет",                  kind: expense, parent: COMMS, default_subaccount: "26.02"}
  - {code: PHONE,         name: "Телефон/мобильная связь",   kind: expense, parent: COMMS, default_subaccount: "26.02"}

