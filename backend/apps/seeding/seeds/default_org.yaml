# ─────────────────────────────────────────────────────────────────────
# 5. Категории номенклатуры (привязаны к модулям)
# ─────────────────────────────────────────────────────────────────────
categories:
  - {name: "Корма",                  module: feed,       default_gl_subaccount: "10.05"}
  - {name: "Сырьё для кормов",       module: feed,       default_gl_subaccount: "10.01"}
  - {name: "Ветпрепараты",           module: vet,        default_gl_subaccount: "10.03"}
  - {name: "Маточник",               module: matochnik,  default_gl_subaccount: "20.01"}
  - {name: "Инкубация",              module: incubation, default_gl_subaccount: "20.03"}
  - {name: "Откорм",                 module: feedlot,    default_gl_subaccount: "20.02"}
  - {name: "Готовая продукция убоя", module: slaughter,  default_gl_subaccount: "43.01"}
  - {name: "Тара и упаковка",        default_gl_subaccount: "10.07"}
  - {name: "Топливо и ГСМ",          default_gl_subaccount: "10.04"}
  - {name: "Хозтовары и инвентарь",  default_gl_subaccount: "10.06"}
  - {name: "Запчасти",               default_gl_subaccount: "10.08"}

# ─────────────────────────────────────────────────────────────────────
# 6. Производственные блоки
#    Хотя бы один блок на каждый продуктовый модуль.
# ─────────────────────────────────────────────────────────────────────
blocks:
  # Маточник
  - {code: "МТЧ-1", name: "Корпус маточника №1", kind: matochnik, module: matochnik}

  # Инкубация
  - {code: "ИНК-1", name: "Инкубационный шкаф №1", kind: incubation, module: incubation}
  - {code: "ВЫВ-1", name: "Выводной шкаф №1",      kind: hatcher,    module: incubation}

  # Откорм
  - {code: "ПТ-1", name: "Птичник №1", kind: feedlot, module: feedlot}
  - {code: "ПТ-2", name: "Птичник №2", kind: feedlot, module: feedlot}

  # Убой
  - {code: "ЛН-1", name: "Линия разделки №1", kind: slaughter_line, module: slaughter}

  # Корма
  - {code: "МКС-1", name: "Линия замеса №1", kind: mixer_line, module: feed}
  - {code: "БНК-1", name: "Бункер готового комбикорма №1", kind: storage_bin, module: feed}

  # Вет.аптека
  - {code: "ВЕТ-1", name: "Склад препаратов", kind: vet_storage, module: vet}

# ─────────────────────────────────────────────────────────────────────
# 7. Склады
#    По одному (или несколько) на каждый модуль с привязкой к default_gl_subaccount.
# ─────────────────────────────────────────────────────────────────────
warehouses:
  # Производственные склады
  - {code: "СК-К",  name: "Склад кормов",                module: feed,       default_gl_subaccount: "10.05", production_block: "БНК-1"}
  - {code: "СК-СР", name: "Склад сырья для кормов",      module: feed,       default_gl_subaccount: "10.01"}
  - {code: "СК-В",  name: "Склад ветпрепаратов",         module: vet,        default_gl_subaccount: "10.03", production_block: "ВЕТ-1"}
  - {code: "СК-М",  name: "Склад маточника",             module: matochnik,  default_gl_subaccount: "20.01"}
  - {code: "СК-И",  name: "Склад инкубации",             module: incubation, default_gl_subaccount: "20.03"}
  - {code: "СК-Ф",  name: "Склад фабрики откорма",       module: feedlot,    default_gl_subaccount: "20.02"}
  - {code: "СК-ГП", name: "Склад готовой продукции (убой)", module: slaughter, default_gl_subaccount: "43.01"}
  - {code: "СК-ОБЩ", name: "Общий склад (хозтовары, инвентарь)", module: stock, default_gl_subaccount: "10.06"}

  # «Кассы» = warehouse-маркеры финансовых каналов с привязкой к 50/51/52/58 субсчетам.
  # Используются в платежах для выбора cash_subaccount.
  - {code: "КАССА-НАЛ",   name: "Касса · наличные UZS",          module: stock, default_gl_subaccount: "50.01"}
  - {code: "БАНК-UZS",    name: "Расчётный счёт UZS",            module: stock, default_gl_subaccount: "51.01"}
  - {code: "БАНК-USD",    name: "Валютный счёт USD",             module: stock, default_gl_subaccount: "52.01"}
  - {code: "CLICK",       name: "Click (электронный кошелёк)",   module: stock, default_gl_subaccount: "58.01"}
  - {code: "ПЕР-ПУТ",     name: "Переводы в пути",               module: stock, default_gl_subaccount: "57.01"}

