# ─────────────────────────────────────────────────────────────────────
# 9. RBAC — роли организации и их permissions
#
# Принцип «деньги принадлежат модулю»:
#   - HEAD_ADMIN / HEAD_ACCOUNTING — admin или r на ledger (видят финансы)
#   - HEAD_SUPPLY — purchases.admin, ledger=none (свои закупки видит, общий
#     кэш-флоу/P&L нет)
#   - HEAD_MATOCHNIK / HEAD_INCUBATION / HEAD_FEEDLOT / HEAD_SLAUGHTER —
#     ledger=none, reports=none. Видят только свои операционные данные.
#     Финансы своего модуля (себестоимость партий) — через field-level RBAC.
#
# Модули, не указанные в `permissions`, ОСТАЮТСЯ нетронутыми (loader не
# знает про них). Чтобы явно запретить — указывайте `level: none`.
# ─────────────────────────────────────────────────────────────────────
roles:
  - code: HEAD_ADMIN
    name: "Главный администратор"
    description: "Полный доступ ко всем модулям системы."
    permissions:
      core: admin
      matochnik: admin
      incubation: admin
      feedlot: admin
      slaughter: admin
      feed: admin
      vet: admin
      stock: admin
      ledger: admin
      reports: admin
      purchases: admin
      sales: admin
      admin: admin

  - code: HEAD_MATOCHNIK
    name: "Главный маточника"
    description: "Управление родительским стадом, яйцесбором, вакцинациями."
    permissions:
      matochnik: admin
      core: rw          # справочники: контрагенты/SKU/блоки
      feed: r           # видит сколько корма пошло
      vet: r            # видит вакцинации/лечения
      stock: r
      purchases: r
      ledger: none      # НЕ видит общие финансы орги (только свои через field-RBAC)
      reports: none

  - code: HEAD_INCUBATION
    name: "Главный инкубации"
    description: "Закладки яиц, овоскопия, выводы цыплят."
    permissions:
      incubation: admin
      matochnik: r      # откуда пришли яйца
      core: rw
      stock: r
      ledger: none
      reports: none

  - code: HEAD_FEEDLOT
    name: "Главный фабрики откорма"
    description: "Партии бройлера, кормление, FCR, падёж, отгрузки на убой."
    permissions:
      feedlot: admin
      incubation: r     # откуда пришли цыплята
      feed: r           # потребление кормов
      vet: r            # лечения
      core: rw
      stock: r
      ledger: none
      reports: none

  - code: HEAD_SLAUGHTER
    name: "Главный убойни"
    description: "Смены разделки, выход тушки, контроль качества."
    permissions:
      slaughter: admin
      feedlot: r        # откуда пришли птицы
      sales: rw         # продажа готовой продукции
      core: rw
      stock: r
      ledger: none
      reports: none

  - code: HEAD_SUPPLY
    name: "Главный кормов и вет.аптеки"
    description: "Рецептура комбикорма, ветеринарный склад, закупки."
    permissions:
      feed: admin
      vet: admin
      purchases: rw     # сами закупают сырьё/препараты
      stock: rw
      matochnik: r
      incubation: r
      feedlot: r
      slaughter: r
      core: rw
      ledger: none      # видит свои закупки, но не общий cashflow
      reports: r        # отчёты по закупкам остаются доступны

  - code: HEAD_ACCOUNTING
    name: "Главный бухгалтерии"
    description: "Закупки, продажи, проводки, отчёты, склад. Read на производство."
    permissions:
      ledger: admin
      reports: admin
      sales: admin
      purchases: admin
      stock: admin
      matochnik: r
      incubation: r
      feedlot: r
      slaughter: r
      feed: r
      vet: r
      core: rw
      admin: r          # доступ на просмотр аудита/ролей
