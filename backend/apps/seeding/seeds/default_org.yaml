  # 71 · Подотчётные
  - {code: "71.01", account: "71", name: "Расчёты с подотчётными лицами"}

  # 76 · Прочие расчёты
  - {code: "76.01", account: "76", name: "Прочие дебиторы"}
  - {code: "76.02", account: "76", name: "Прочие кредиторы"}

  # 79 · Внутрихозяйственные расчёты (транзит между модулями)
  - {code: "79.01", account: "79", name: "Межмодульные передачи"}

  # 84 · Нераспределённая прибыль
  - {code: "84.01", account: "84", name: "Нераспределённая прибыль текущего года"}
  - {code: "84.02", account: "84", name: "Нераспределённая прибыль прошлых лет"}

  # 90 · Продажи
  - {code: "90.01", account: "90", name: "Выручка от продаж"}
  - {code: "90.02", account: "90", name: "Себестоимость продаж"}
