  - {code: "50.02", account: "50", name: "Касса в иностранной валюте"}

  # 51 · Банк (UZS)
  - {code: "51.01", account: "51", name: "Расчётный счёт UZS"}
  - {code: "51.02", account: "51", name: "Расчётный счёт UZS · резерв"}

  # 52 · Валютный счёт
  - {code: "52.01", account: "52", name: "Валютный счёт USD"}
  - {code: "52.02", account: "52", name: "Валютный счёт прочая валюта"}

  # 57 · Переводы в пути
  - {code: "57.01", account: "57", name: "Переводы в пути"}

  # 58 · Электронные кошельки / Click
  - {code: "58.01", account: "58", name: "Click (электронный кошелёк)"}
  - {code: "58.02", account: "58", name: "Прочие электронные деньги"}

  # 60 · Поставщики
  - {code: "60.01", account: "60", name: "Расчёты с поставщиками (UZS)"}
  - {code: "60.02", account: "60", name: "Расчёты с поставщиками в валюте"}
  - {code: "60.03", account: "60", name: "Авансы выданные"}

  # 62 · Покупатели
  - {code: "62.01", account: "62", name: "Расчёты с покупателями (UZS)"}
