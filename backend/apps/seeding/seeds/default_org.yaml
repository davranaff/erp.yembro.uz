  - {code: "26.02", account: "26", name: "Связь и интернет"}
  - {code: "26.03", account: "26", name: "Обслуживание и ремонт"}
  - {code: "26.04", account: "26", name: "Канцелярия и офис"}
  - {code: "26.05", account: "26", name: "Налоги (кроме на прибыль)"}
  - {code: "26.06", account: "26", name: "Прочие административные"}

  # 43 · Готовая продукция
  - {code: "43.01", account: "43", name: "Тушки и разделка",       module: slaughter}
  - {code: "43.02", account: "43", name: "Инкубационное яйцо",     module: matochnik}
  - {code: "43.03", account: "43", name: "Живая птица на продажу", module: feedlot}
  - {code: "43.04", account: "43", name: "Готовый комбикорм",      module: feed}

  # 44 · Расходы на продажу
  - {code: "44.01", account: "44", name: "Транспортные расходы"}
  - {code: "44.02", account: "44", name: "Реклама и маркетинг"}
  - {code: "44.03", account: "44", name: "Прочие коммерческие"}

  # 50 · Касса (наличные)
