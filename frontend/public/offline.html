<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Нет сети · YemBro ERP</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#E8751A" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #FFFDF7;
      color: #2A1F0E;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #FCE7CB;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: #5C4F3A;
      margin-bottom: 18px;
    }
    .hint {
      font-size: 13px;
      color: #8B7E6A;
      background: #F5EFE2;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 24px;
      text-align: left;
    }
    .hint strong { color: #2A1F0E; }
    button {
      width: 100%;
      min-height: 48px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      background: #E8751A;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:active { background: #c95e0a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E8751A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Нет интернета</h1>
    <p>Вы в режиме оффлайн. Это нормально — большинство операций ERP можно делать без сети.</p>
    <div class="hint">
      <strong>Что сейчас работает:</strong><br />
      ✓ Заполнение daily-log (падёж, взвешивание) — отправится автоматически при появлении сети<br />
      ✓ Просмотр уже загруженных страниц
    </div>
    <button onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
